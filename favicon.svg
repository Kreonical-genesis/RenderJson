<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  
  <!-- Simple Cube -->
  <g transform="translate(16, 16)">
    <!-- Top -->
    <polygon points="0,-8 -6,-4 -6,4 0,8" fill="#4ade80"/>
    <polygon points="0,-8 6,-4 6,4 0,8" fill="#22c55e"/>
    <!-- Left -->
    <polygon points="-6,-4 -6,4 0,8 0,-8" fill="#16a34a"/>
    <!-- Right -->
    <polygon points="6,-4 6,4 0,8 0,-8" fill="#15803d"/>
    
    <!-- Camera -->
    <circle cx="0" cy="1" r="3" fill="#1a1a2e"/>
    <circle cx="0" cy="1" r="2" fill="none" stroke="#4ade80" stroke-width="0.5"/>
    <circle cx="0" cy="1" r="0.8" fill="#4ade80"/>
  </g>
</svg>