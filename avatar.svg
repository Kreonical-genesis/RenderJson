<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="cube" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  
  <!-- 3D Cube -->
  <g transform="translate(256, 256)">
    <!-- Top face -->
    <polygon points="0,-120 -104,-60 -104,60 0,120" fill="#22c55e" opacity="0.9"/>
    <polygon points="0,-120 104,-60 104,60 0,120" fill="#4ade80" opacity="0.9"/>
    
    <!-- Left face -->
    <polygon points="-104,-60 -104,60 0,120 0,-120" fill="#16a34a"/>
    
    <!-- Right face -->
    <polygon points="104,-60 104,60 0,120 0,-120" fill="#15803d"/>
    
    <!-- Camera/Render symbol -->
    <circle cx="0" cy="10" r="50" fill="#1a1a2e"/>
    <circle cx="0" cy="10" r="35" fill="none" stroke="#4ade80" stroke-width="6"/>
    <circle cx="0" cy="10" r="12" fill="#4ade80"/>
    
    <!-- Lens glow -->
    <circle cx="0" cy="10" r="8" fill="#fff" opacity="0.8"/>
  </g>
  
  <!-- Decorative rays -->
  <g opacity="0.15">
    <line x1="256" y1="80" x2="256" y2="40" stroke="#4ade80" stroke-width="4" stroke-linecap="round"/>
    <line x1="180" y1="140" x2="150" y2="110" stroke="#4ade80" stroke-width="4" stroke-linecap="round"/>
    <line x1="332" y1="140" x2="362" y2="110" stroke="#4ade80" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>